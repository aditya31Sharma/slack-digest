<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06070d">
<meta name="dash-build" content="cockpit-9">
<title>House of CC — Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#06070d; --bg2:#0a0c15;
    --glass:rgba(17,20,32,.55); --glass-hi:rgba(26,31,50,.55);
    --stroke:rgba(120,190,255,.14); --stroke-hot:rgba(34,224,255,.5);
    --hi:rgba(255,255,255,.05);
    --txt:#eaf1ff; --muted:#8a92b2; --faint:#565d7d;
    --cyan:#22e0ff; --violet:#8b7bff; --magenta:#ff5cc8;
    --accent:#22e0ff; --accent-2:#8b7bff; --accent-ink:#04121a; --accent-soft:rgba(34,224,255,.13);
    --up:#3ff0b0; --down:#ff5c8a; --up-dim:rgba(63,240,176,.14); --down-dim:rgba(255,92,138,.15);
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:22px; --s6:34px;
    --r:20px; --r-sm:16px; --r-xs:11px;
    --glow:0 0 22px rgba(34,224,255,.28);
    --e2:0 14px 40px -14px rgba(0,0,0,.8);
    --e3:0 26px 60px -18px rgba(0,0,0,.85);
    --font-d:'Space Grotesk','DM Sans',sans-serif;
    --cmd-h:112px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;color:var(--txt);-webkit-font-smoothing:antialiased;padding-bottom:56px;position:relative;
    font-family:'DM Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg)}
  /* animated aurora + HUD grid backdrop */
  body::before{content:"";position:fixed;inset:-25%;z-index:-2;pointer-events:none;
    background:
      radial-gradient(38% 38% at 18% 18%, rgba(34,224,255,.20), transparent 60%),
      radial-gradient(40% 40% at 82% 22%, rgba(139,123,255,.18), transparent 60%),
      radial-gradient(46% 46% at 62% 92%, rgba(255,92,200,.12), transparent 62%);
    filter:blur(36px);animation:aurora 26s ease-in-out infinite alternate}
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background-image:linear-gradient(rgba(120,180,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(120,180,255,.045) 1px,transparent 1px);
    background-size:46px 46px;
    -webkit-mask:radial-gradient(120% 90% at 50% -10%,#000,transparent 78%);mask:radial-gradient(120% 90% at 50% -10%,#000,transparent 78%)}
  @keyframes aurora{from{transform:translate3d(-3%,-2%,0) scale(1.05)}to{transform:translate3d(3%,3%,0) scale(1.16)}}
  a{color:inherit}
  .num{font-family:'Fira Code',ui-monospace,SFMono-Regular,Menlo,monospace;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;letter-spacing:-.02em}
  .muted{color:var(--muted)} .small{font-size:12px}

  /* glass surface */
  .glass{background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--stroke);box-shadow:var(--e2),inset 0 1px 0 var(--hi)}

  /* ---------- command bar ---------- */
  .cmd{position:sticky;top:0;z-index:50;background:rgba(6,7,13,.6);backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);border-bottom:1px solid var(--stroke)}
  .cmd__in{max-width:none;padding:11px 26px}
  .cmd__row{display:flex;align-items:center;gap:var(--s3);flex-wrap:wrap}
  .cmd__row+.cmd__row{margin-top:11px}
  .brandname{font-family:var(--font-d);display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:.02em;margin-right:auto}
  .brandname b{color:var(--accent);font-weight:700;text-shadow:0 0 14px rgba(34,224,255,.6)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan),0 0 4px var(--cyan);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.35}}
  .rangelabel{font-family:var(--font-d);font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.03em}

  .modeseg{display:inline-flex;background:var(--glass);border:1px solid var(--stroke);border-radius:12px;padding:3px;gap:3px}
  .seg{font-family:var(--font-d);border:0;background:transparent;color:var(--muted);font-weight:600;font-size:12.5px;padding:7px 15px;border-radius:9px;cursor:pointer;transition:.16s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .seg.on{background:linear-gradient(135deg,var(--cyan),var(--violet));color:var(--accent-ink);box-shadow:0 0 18px rgba(34,224,255,.45)}
  .seg:hover:not(.on){color:var(--txt)}

  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-family:var(--font-d);border:1px solid var(--stroke);background:var(--glass);color:var(--muted);font-weight:600;font-size:12px;line-height:1;padding:9px 13px;border-radius:10px;cursor:pointer;transition:.16s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .chip:hover{color:var(--txt);border-color:var(--stroke-hot);transform:translateY(-1px)}
  .chip.on{background:linear-gradient(135deg,var(--cyan),var(--violet));color:var(--accent-ink);border-color:transparent;font-weight:700;box-shadow:0 0 22px rgba(34,224,255,.5)}
  .custom{display:none;gap:var(--s2);align-items:center;flex-wrap:wrap}
  .custom.show{display:flex}
  .custom input[type=date]{background:var(--glass);border:1px solid var(--stroke);color:var(--txt);border-radius:9px;padding:8px 10px;font:600 12px inherit;color-scheme:dark}
  .btn{font-family:var(--font-d);background:linear-gradient(135deg,var(--cyan),var(--violet));border:0;color:var(--accent-ink);font-weight:700;font-size:12px;padding:9px 15px;border-radius:9px;cursor:pointer;box-shadow:0 0 20px rgba(34,224,255,.45);transition:.16s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 0 28px rgba(34,224,255,.6)}

  .bpick{position:relative}
  .bpick__btn{font-family:var(--font-d);display:flex;align-items:center;gap:6px;border:1px solid var(--stroke);background:var(--glass);color:var(--txt);font-weight:600;font-size:12px;padding:9px 13px;border-radius:10px;cursor:pointer}
  .bpick__btn strong{color:var(--accent)}
  .bpick__panel{position:absolute;right:0;top:calc(100% + 10px);width:min(300px,86vw);max-height:60vh;overflow:auto;background:var(--glass-hi);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--stroke);border-radius:16px;padding:8px;z-index:60;display:none;box-shadow:var(--e3)}
  .bpick__panel.show{display:block}
  .bopt{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13px}
  .bopt:hover{background:rgba(120,190,255,.08)}
  .bopt input{accent-color:var(--cyan);width:15px;height:15px}
  .bopt.allrow{border-bottom:1px solid var(--stroke);margin-bottom:4px;font-weight:700}

  /* ---------- shell ---------- */
  .shell{max-width:none;padding:var(--s5) 26px}
  @media(min-width:960px){ .shell{display:grid;grid-template-columns:250px minmax(0,1fr);gap:var(--s5);align-items:start} }
  .shell>main{min-width:0}
  @media(max-width:959px){ .shell{padding:16px 13px} }

  /* nav rail */
  .rail{display:flex;flex-direction:column;gap:2px}
  @media(min-width:960px){ .rail{position:sticky;top:calc(var(--cmd-h) + 18px);max-height:calc(100vh - var(--cmd-h) - 34px);overflow:auto;padding-right:4px} }
  .rail__sect{font-family:var(--font-d);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:13px 10px 6px}
  .navitem{font-family:var(--font-d);display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;border:1px solid transparent;background:transparent;color:var(--muted);font-weight:600;font-size:13px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:.15s}
  .navitem:hover{background:var(--glass);color:var(--txt);transform:translateX(2px)}
  .navitem.on{background:linear-gradient(135deg,rgba(34,224,255,.16),rgba(139,123,255,.1));border-color:var(--stroke-hot);color:var(--txt);box-shadow:0 0 20px -6px rgba(34,224,255,.5)}
  .navitem.on .navitem__name{color:var(--cyan)}
  .navitem__name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .navitem__meta{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--faint);white-space:nowrap;flex-shrink:0}
  @media(max-width:959px){ .rail{display:none} }

  /* ---------- section label ---------- */
  .sect{font-family:var(--font-d);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:var(--s6) 2px var(--s4);display:flex;align-items:center;gap:10px}
  .sect::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--stroke),transparent)}
  .sect:first-child{margin-top:0}

  /* ---------- summary hero ---------- */
  .summary{position:relative;overflow:hidden;background:var(--glass-hi);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--stroke);border-radius:var(--r);padding:var(--s6);box-shadow:var(--e2),inset 0 1px 0 var(--hi)}
  .summary::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--violet),var(--magenta));box-shadow:0 0 18px rgba(34,224,255,.6)}
  .summary::after{content:"";position:absolute;inset:0;background:radial-gradient(620px 300px at 100% 0%,rgba(34,224,255,.14),transparent 60%);pointer-events:none}
  .summary>*{position:relative}
  .summary__eyebrow{font-family:var(--font-d);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .summary__row{display:flex;align-items:baseline;gap:var(--s4);flex-wrap:wrap;margin-top:10px}
  .summary__big{font-family:var(--font-d);font-size:clamp(38px,7vw,60px);font-weight:700;letter-spacing:-.02em;line-height:.98;
    background:linear-gradient(100deg,#8be9ff,#22e0ff 30%,#8b7bff 68%,#ff5cc8);-webkit-background-clip:text;background-clip:text;color:transparent}
  .brief{margin-top:var(--s4);font-size:14.5px;line-height:1.6;color:var(--muted);max-width:76ch}
  .brief b{color:var(--txt);font-weight:700}
  .brief .bn{color:var(--cyan);font-weight:700}
  .brief .gn{color:var(--up);font-weight:700} .brief .rn{color:var(--down);font-weight:700}

  /* delta pill */
  .delta{display:inline-flex;align-items:center;gap:3px;font-family:var(--font-d);font-size:11.5px;font-weight:600;padding:3px 8px;border-radius:8px;letter-spacing:.01em;vertical-align:middle}
  .delta.up{background:var(--up-dim);color:var(--up);box-shadow:inset 0 0 0 1px rgba(63,240,176,.25)}
  .delta.down{background:var(--down-dim);color:var(--down);box-shadow:inset 0 0 0 1px rgba(255,92,138,.28)}
  .delta.flat{background:rgba(255,255,255,.05);color:var(--faint)}
  .delta.big{font-size:13px;padding:5px 11px}

  /* ---------- kpi tiles ---------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:var(--s3)}
  .kpi{position:relative;overflow:hidden;background:var(--glass);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border:1px solid var(--stroke);border-radius:var(--r-sm);padding:15px 16px;box-shadow:inset 0 1px 0 var(--hi);transition:transform .22s cubic-bezier(.2,.7,.2,1),box-shadow .22s ease,border-color .22s ease;animation:fade .5s cubic-bezier(.2,.7,.2,1) backwards}
  .kpi:hover{transform:translateY(-4px);border-color:var(--stroke-hot);box-shadow:var(--glow),var(--e3)}
  .kpi:nth-child(2){animation-delay:.04s}.kpi:nth-child(3){animation-delay:.08s}.kpi:nth-child(4){animation-delay:.12s}
  .kpi:nth-child(5){animation-delay:.16s}.kpi:nth-child(6){animation-delay:.2s}.kpi:nth-child(7){animation-delay:.24s}.kpi:nth-child(8){animation-delay:.28s}
  .kpi__top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .kpi__l{font-family:var(--font-d);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .kpi__v{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-top:8px}
  .kpi__v.pos{color:var(--up);text-shadow:0 0 16px rgba(63,240,176,.35)} .kpi__v.neg{color:var(--down);text-shadow:0 0 16px rgba(255,92,138,.3)}
  .kpi__spark{margin-top:10px;height:28px}
  .kpi__spark svg{width:100%;height:28px;display:block}

  /* ---------- movers ---------- */
  .movers{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3)}
  @media(max-width:620px){.movers{grid-template-columns:1fr}}
  .mcard{background:var(--glass);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border:1px solid var(--stroke);border-radius:var(--r-sm);padding:15px 17px;box-shadow:inset 0 1px 0 var(--hi)}
  .mcard h4{font-family:var(--font-d);margin:0 0 11px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .mrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid var(--stroke);cursor:pointer;transition:padding-left .15s ease}
  .mrow:first-of-type{border-top:0}
  .mrow:hover{padding-left:5px}
  .mrow:hover .mname{color:var(--cyan)}
  .mname{font-weight:700;font-size:13px;transition:.12s}
  .mval{font-size:12px;color:var(--muted)}

  /* ---------- chart cards ---------- */
  .card{background:var(--glass);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);border:1px solid var(--stroke);border-radius:var(--r);padding:var(--s5) var(--s5) 12px;margin-bottom:var(--s3);box-shadow:var(--e2),inset 0 1px 0 var(--hi)}
  .card h3{font-family:var(--font-d);margin:0 0 var(--s4);font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3);min-width:0}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .chartbox{position:relative;height:286px}
  .chartbox.tall{height:336px}

  /* ---------- table ---------- */
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
  th,td{text-align:right;padding:11px 12px;white-space:nowrap}
  th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:rgba(13,16,26,.9);backdrop-filter:blur(8px)}
  thead th{font-family:var(--font-d);color:var(--faint);font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--stroke);font-weight:600}
  tbody tr{border-top:1px solid var(--stroke);cursor:pointer;transition:background .12s ease}
  tbody tr:hover{background:rgba(34,224,255,.05)}
  tbody tr:hover td:first-child{background:rgba(20,26,40,.95)}
  td.pos{color:var(--up)} td.neg{color:var(--down)}
  .bname{font-weight:700}

  .empty{text-align:center;color:var(--faint);padding:60px 0;font-size:14px}
  .spinner{width:32px;height:32px;border:2.5px solid var(--stroke);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin:64px auto;box-shadow:0 0 22px rgba(34,224,255,.3)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:var(--down-dim);color:#ffd6e2;border-radius:14px;padding:12px 14px;margin:12px 0;font-size:13px;box-shadow:inset 0 0 0 1px rgba(255,92,138,.3)}
  .foot{font-family:var(--font-d);text-align:center;color:var(--faint);font-size:11px;letter-spacing:.04em;padding:var(--s6) 0 0}
  .fadein{animation:fade .5s cubic-bezier(.2,.7,.2,1)}
  @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  /* a11y */
  :focus-visible{outline:2px solid var(--cyan);outline-offset:2px;border-radius:8px}
  .navitem:focus-visible,.brow:focus-visible,.tabbtn:focus-visible,.chip:focus-visible,.seg:focus-visible{outline-offset:-2px}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
    body::before{animation:none}
  }

  /* ---------- mobile app shell ---------- */
  .tabbar{display:none}
  .backbtn{display:none}
  @media(max-width:959px){
    body{padding-bottom:calc(68px + env(safe-area-inset-bottom))}
    .tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:70;
      background:rgba(8,10,18,.72);backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);
      border-top:1px solid var(--stroke);padding:9px 8px calc(9px + env(safe-area-inset-bottom))}
    .tabbtn{font-family:var(--font-d);flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:transparent;border:0;
      color:var(--faint);font-weight:600;font-size:10.5px;letter-spacing:.04em;cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent;transition:.14s}
    .tabbtn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .16s ease}
    .tabbtn.on{color:var(--cyan)}
    .tabbtn.on svg{transform:translateY(-1px) scale(1.08);filter:drop-shadow(0 0 8px rgba(34,224,255,.6))}
    .summary{padding:var(--s5)}
    .summary__big{font-size:clamp(34px,11vw,46px)}
    .kpis{grid-template-columns:1fr 1fr;gap:11px}
    .chartbox{height:248px}
    .backbtn{font-family:var(--font-d);display:inline-flex;align-items:center;gap:5px;background:var(--glass);border:1px solid var(--stroke);
      color:var(--muted);font-weight:600;font-size:12.5px;padding:9px 14px;border-radius:10px;cursor:pointer;margin-bottom:var(--s4)}
    .backbtn:active{transform:scale(.98)}
  }
  /* brand list (mobile) */
  .blist{display:flex;flex-direction:column;gap:9px}
  .brow{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;border:1px solid var(--stroke);
    background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:16px;padding:16px 17px;cursor:pointer;color:var(--txt);
    -webkit-tap-highlight-color:transparent;box-shadow:inset 0 1px 0 var(--hi);transition:transform .15s ease,border-color .15s ease}
  .brow:active{transform:scale(.99);border-color:var(--stroke-hot)}
  .brow__name{font-weight:700;font-size:15px}
  .brow__meta{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .chev{color:var(--cyan);font-size:20px;line-height:1;margin-left:2px}
</style>
</head>
<body>

<div class="cmd">
  <div class="cmd__in">
    <div class="cmd__row">
      <div class="brandname"><span class="dot"></span>House of CC <b>· Cockpit</b></div>
      <div class="modeseg" id="modeSeg">
        <button class="seg on" data-platform="shopify">Shopify</button>
        <button class="seg" data-platform="cc">Culture Circle</button>
      </div>
    </div>
    <div class="cmd__row">
      <div class="chips" id="rangeChips">
        <button class="chip on" data-range="yesterday">Yesterday</button>
        <button class="chip" data-range="today">Today</button>
        <button class="chip" data-range="7d">7D</button>
        <button class="chip" data-range="30d">30D</button>
        <button class="chip" data-range="this month">This month</button>
        <button class="chip" data-range="__custom">Custom</button>
      </div>
      <div class="custom" id="customBox">
        <input type="date" id="fromDate"><span class="muted small">to</span><input type="date" id="toDate">
        <button class="btn" id="applyCustom">Apply</button>
      </div>
      <div class="bpick" style="margin-left:auto">
        <button class="bpick__btn" id="bpickBtn">Brands: <strong id="bpickLabel">All</strong> ▾</button>
        <div class="bpick__panel" id="bpickPanel"></div>
      </div>
      <div class="rangelabel" id="rangeLabel">—</div>
    </div>
  </div>
</div>

<div class="shell">
  <aside class="rail" id="rail"></aside>
  <main>
    <div id="view"><div class="spinner"></div></div>
    <div class="foot" id="foot"></div>
  </main>
</div>

<nav class="tabbar" id="tabbar">
  <button class="tabbtn" data-nav="overview"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Overview</span></button>
  <button class="tabbtn" data-nav="brands"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.3"/><circle cx="3.5" cy="12" r="1.3"/><circle cx="3.5" cy="18" r="1.3"/></svg><span>Brands</span></button>
  <button class="tabbtn" data-nav="export"><svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 21h16"/></svg><span>Export</span></button>
</nav>

<script>
const API = '/api/dashboard';
const RUPEE = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 0 });
const money = n => '₹' + RUPEE.format(Math.round(n || 0));
const moneyShort = n => { n = Math.round(n||0); if(n>=1e7) return '₹'+(n/1e7).toFixed(2)+'Cr'; if(n>=1e5) return '₹'+(n/1e5).toFixed(2)+'L'; if(n>=1e3) return '₹'+(n/1e3).toFixed(1)+'k'; return '₹'+RUPEE.format(n); };
const num = n => RUPEE.format(Math.round(n || 0));
const pct = n => (n == null ? '—' : n.toFixed(2) + '%');
const roasFmt = n => (n == null ? '—' : n.toFixed(2) + 'x');
const COLORS = ['#22e0ff','#8b7bff','#ff5cc8','#3ff0b0','#ffc24d','#5cc8ff','#c86bff','#66f0c0','#ff8a5c','#7c8cf8','#2dd4bf','#e879f9','#60a5fa','#f472b6','#38bdf8','#f87171'];

const state = { platform:'shopify', rangeText:'yesterday', report:null, prev:null, selected:null, tab:'overview', loading:false };
const charts = {};
function destroyCharts(){ for(const k in charts){ try{charts[k].destroy();}catch(e){} delete charts[k]; } }
function el(id){ return document.getElementById(id); }
function ddmmyy(iso){ const [y,m,d]=iso.split('-'); return `${d}.${m}.${y.slice(2)}`; }
function istDay(ms){ return new Date(ms).toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'}); }

function prevRangeParam(range){
  if(!range || !range.from) return null;
  const from = Date.parse(range.from), to = Date.parse(range.to);
  if(!from || !to || to<=from) return null;
  const len = to - from;
  return `${ddmmyy(istDay(from-len))}-${ddmmyy(istDay(from-1))}`;
}

async function load(){
  state.loading = true; el('view').innerHTML = '<div class="spinner"></div>'; el('rail').innerHTML = ''; destroyCharts();
  try{
    const r = await fetch(`${API}?platform=${state.platform}&range=${encodeURIComponent(state.rangeText)}`);
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    state.report = data; state.prev = null;
    el('rangeLabel').textContent = (data.range && data.range.label) || '';

    if(data.connected === false){
      el('bpickLabel').textContent = '—'; el('bpickPanel').innerHTML = '';
      el('view').innerHTML = `<div class="empty">Culture Circle data source isn't connected yet.<br><span class="small">Send the CC sales/orders source and it lights up here.</span></div>`;
      el('foot').textContent = `Culture Circle · ${(data.range&&data.range.label)||''} · awaiting data source`;
      state.loading = false; return;
    }

    if(state.selected === null) state.selected = new Set(data.brands.map(b=>b.key));
    else state.selected = new Set([...state.selected].filter(k=>data.brands.some(b=>b.key===k)));
    if(state.selected.size === 0) state.selected = new Set(data.brands.map(b=>b.key));

    buildBrandPicker(); buildNav(); render();

    const pr = prevRangeParam(data.range);
    if(pr){
      fetch(`${API}?platform=${state.platform}&range=${encodeURIComponent(pr)}`)
        .then(x=>x.json()).then(pdata=>{
          if(pdata && !pdata.error && pdata.connected!==false && state.report===data){
            state.prev = pdata; buildNav(); render();
          }
        }).catch(()=>{});
    }
  }catch(e){
    el('view').innerHTML = `<div class="err">Couldn't load data: ${e.message}</div>`;
  }
  state.loading = false;
}

function selectedBrands(){ return state.report.brands.filter(b=>state.selected.has(b.key)); }
function prevBrand(key){ return state.prev ? state.prev.brands.find(b=>b.key===key) : null; }

/* ---------- deltas ---------- */
function deltaPct(cur, prev){ if(prev==null||prev===0) return null; return (cur-prev)/Math.abs(prev)*100; }
function deltaPill(cur, prev, opts){
  opts = opts || {};
  const d = deltaPct(cur, prev);
  if(d==null){ return opts.silent? '' : `<span class="delta flat">·</span>`; }
  const up = d>=0, cls = Math.abs(d)<0.05?'flat':(up?'up':'down');
  const arrow = Math.abs(d)<0.05?'·':(up?'▲':'▼');
  return `<span class="delta ${cls} ${opts.big?'big':''}">${arrow} ${Math.abs(d).toFixed(0)}%</span>`;
}

/* ---------- sparkline ---------- */
function sparkline(values, color){
  const v = values.filter(x=>x!=null);
  if(v.length<3) return '';
  const w=160, h=28, min=Math.min(...v), max=Math.max(...v), span=(max-min)||1;
  const pts = v.map((x,i)=>{ const px=(i/(v.length-1))*w; const py=h-2-((x-min)/span)*(h-4); return `${px.toFixed(1)},${py.toFixed(1)}`; });
  const last=v[v.length-1], first=v[0];
  const c = color || (last>=first ? 'var(--up)' : 'var(--down)');
  const lx=(w).toFixed(1), ly=(h-2-((last-min)/span)*(h-4)).toFixed(1);
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts.join(' ')}" fill="none" stroke="${c}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${lx}" cy="${ly}" r="2.1" fill="${c}"/></svg>`;
}

/* ---------- brand picker (filter) ---------- */
function buildBrandPicker(){
  const all = state.report.brands;
  const allOn = state.selected.size === all.length;
  let html = `<label class="bopt allrow"><input type="checkbox" id="ballcb" ${allOn?'checked':''}><span>All brands (${all.length})</span></label>`;
  for(const b of all) html += `<label class="bopt"><input type="checkbox" class="bcb" value="${b.key}" ${state.selected.has(b.key)?'checked':''}><span>${esc(b.brand)}</span></label>`;
  el('bpickPanel').innerHTML = html;
  el('ballcb').onchange = e => { state.selected = e.target.checked ? new Set(all.map(b=>b.key)) : new Set([all[0].key]); buildBrandPicker(); buildNav(); render(); };
  el('bpickPanel').querySelectorAll('.bcb').forEach(cb => cb.onchange = () => {
    const s = new Set(all.filter(b=>{ const n=el('bpickPanel').querySelector(`.bcb[value="${b.key}"]`); return n&&n.checked; }).map(b=>b.key));
    if(s.size===0) return;
    state.selected = s;
    if(state.tab!=='overview' && state.tab!=='export' && !s.has(state.tab)) state.tab='overview';
    buildBrandPicker(); buildNav(); render();
  });
  el('bpickLabel').textContent = allOn ? 'All' : `${state.selected.size} selected`;
}

/* ---------- nav rail (nav + live leaderboard) ---------- */
function buildNav(){
  const brands = selectedBrands().slice().sort((a,b)=>b.revenue-a.revenue);
  let html = `<div class="rail__sect">Views</div>`
    + navItem('overview','Overview','')
    + navItem('export','Export','')
    + `<div class="rail__sect">Brands · ${brands.length}</div>`;
  for(const b of brands){
    const p = prevBrand(b.key);
    const meta = `<span class="navitem__meta num">${moneyShort(b.revenue)} ${p?deltaPill(b.revenue,p.revenue,{silent:true}):''}</span>`;
    html += navItem(b.key, esc(b.brand), meta);
  }
  el('rail').innerHTML = html;
  el('rail').querySelectorAll('.navitem').forEach(n=>n.onclick=()=>{ state.tab=n.dataset.tab; buildNav(); render(); if(window.innerWidth>=960) window.scrollTo({top:0,behavior:'smooth'}); });
}
function navItem(tab, name, meta){
  return `<button class="navitem ${state.tab===tab?'on':''}" data-tab="${tab}"><span class="navitem__name">${name}</span>${meta||''}</button>`;
}

/* ---------- aggregate ---------- */
function agg(brands){
  const a = { revenue:0, orders:0, adSpend:0, adClicks:0, adImpr:0, sessions:0, sessKnown:false };
  for(const b of brands){
    a.revenue += b.revenue||0; a.orders += b.orders||0;
    a.adSpend += b.adSpend||0; a.adClicks += b.adClicks||0; a.adImpr += b.adImpr||0;
    if(b.sessions!=null){ a.sessions += b.sessions; a.sessKnown = true; }
  }
  a.aov = a.orders ? a.revenue/a.orders : 0;
  a.roas = a.adSpend>0 ? a.revenue/a.adSpend : null;
  a.ctr = a.adImpr>0 ? a.adClicks/a.adImpr*100 : null;
  a.cvr = a.sessKnown && a.sessions ? a.orders/a.sessions*100 : null;
  return a;
}
function dailyMerge(brands){ const d={}; for(const b of brands) for(const [k,v] of Object.entries(b.daily||{})){ d[k]=d[k]||{revenue:0,orders:0}; d[k].revenue+=v.revenue; d[k].orders+=v.orders; } return d; }

/* ---------- render ---------- */
function render(){
  if(state.tab==='overview') renderOverview();
  else if(state.tab==='export') renderExport();
  else if(state.tab==='brands') renderBrands();
  else renderBrand(state.tab);
  syncTabbar();
  el('foot').textContent = `Live · Shopify + Meta · ${state.report.range.label} · updated ${new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit'})} IST`;
}
/* mobile brand list (bottom-tab "Brands") */
function renderBrands(){
  const brands = selectedBrands().slice().sort((a,b)=>b.revenue-a.revenue);
  let html = `<div class="sect">Brands · ${brands.length}</div><div class="blist fadein">`;
  for(const b of brands){ const p=prevBrand(b.key);
    html += `<button class="brow" data-brand="${b.key}"><span class="brow__name">${esc(b.brand)}</span><span class="brow__meta num">${moneyShort(b.revenue)} ${p?deltaPill(b.revenue,p.revenue,{silent:true}):''}<span class="chev">›</span></span></button>`;
  }
  html += `</div>`;
  el('view').innerHTML = html;
  el('view').querySelectorAll('.brow').forEach(r=>r.onclick=()=>{ state.tab=r.dataset.brand; buildNav(); render(); window.scrollTo({top:0}); });
}
function syncTabbar(){
  const isBrand = !['overview','export','brands'].includes(state.tab);
  el('tabbar').querySelectorAll('.tabbtn').forEach(t=>{
    const nav=t.dataset.nav;
    t.classList.toggle('on', nav===state.tab || (nav==='brands' && isBrand));
  });
}

/* ---------- briefing ---------- */
function briefing(brands, a, pa){
  const parts = [];
  const dRev = pa ? deltaPct(a.revenue, pa.revenue) : null;
  if(dRev!=null){ const cls=dRev>=0?'gn':'rn'; parts.push(`Portfolio is <span class="${cls}">${dRev>=0?'up':'down'} ${Math.abs(dRev).toFixed(0)}%</span> vs the prior period.`); }
  if(state.prev){
    const floor=5000;
    const moved = brands.map(b=>{ const p=prevBrand(b.key); return {b,d:p?deltaPct(b.revenue,p.revenue):null,p}; })
      .filter(x=>x.d!=null && (x.b.revenue>=floor || (x.p&&x.p.revenue>=floor)));
    const up=moved.slice().sort((x,y)=>y.d-x.d)[0], dn=moved.slice().sort((x,y)=>x.d-y.d)[0];
    if(up && up.d>5) parts.push(`<span class="bn">${esc(up.b.brand)}</span> led the climb (<span class="gn">+${up.d.toFixed(0)}%</span>, ${moneyShort(up.b.revenue)}).`);
    if(dn && dn.d<-5 && (!up || dn.b.key!==up.b.key)) parts.push(`<span class="bn">${esc(dn.b.brand)}</span> slipped <span class="rn">${dn.d.toFixed(0)}%</span>.`);
  }
  const burning = brands.filter(b=>(b.adSpend||0)>1000 && b.roas!=null && b.roas<1).sort((x,y)=>y.adSpend-x.adSpend)[0];
  if(burning) parts.push(`<span class="bn">${esc(burning.brand)}</span> is <span class="rn">underwater on ads</span> — ${moneyShort(burning.adSpend)} at ${roasFmt(burning.roas)} ROAS.`);
  const top = brands.slice().sort((x,y)=>y.revenue-x.revenue)[0];
  if(top && top.bestSeller) parts.push(`Best seller: <b>${esc(top.bestSeller.title)}</b>.`);
  if(!parts.length) parts.push(`${brands.length} brand${brands.length>1?'s':''} reporting for ${esc(state.report.range.label)}.`);
  return parts.join(' ');
}

function renderOverview(){
  const brands = selectedBrands().slice().sort((a,b)=>b.revenue-a.revenue);
  const a = agg(brands);
  const pa = state.prev ? agg(state.prev.brands.filter(b=>state.selected.has(b.key))) : null;
  const hasAds = brands.some(b=>(b.adSpend||0)>0);
  const mergedDaily = dailyMerge(brands), days = Object.keys(mergedDaily).sort();
  const revSeries = days.map(d=>mergedDaily[d].revenue), ordSeries = days.map(d=>mergedDaily[d].orders);

  let html = `<div class="summary fadein">
    <div class="summary__eyebrow">${esc(state.report.range.label)} · ${brands.length} brand${brands.length>1?'s':''} · total revenue</div>
    <div class="summary__row"><div class="summary__big num">${money(a.revenue)}</div>${pa?deltaPill(a.revenue,pa.revenue,{big:true}):''}</div>
    <div class="brief">${briefing(brands,a,pa)}</div>
  </div>`;

  html += `<div class="sect">Key metrics</div>`;
  html += '<div class="kpis">'
    + kpiCard('Orders', num(a.orders), pa?deltaPill(a.orders,pa.orders):'', sparkline(ordSeries,'var(--accent)'))
    + kpiCard('AOV', money(a.aov), pa?deltaPill(a.aov,pa.aov):'', '')
    + (hasAds?kpiCard('Ad spend', moneyShort(a.adSpend), pa?deltaPill(a.adSpend,pa.adSpend):'', ''):'')
    + (hasAds?kpiCard('ROAS', roasFmt(a.roas), pa&&pa.roas!=null?deltaPill(a.roas,pa.roas):'', '', a.roas!=null?(a.roas>=1?'pos':'neg'):''):'')
    + (hasAds?kpiCard('Avg CTR', pct(a.ctr), pa&&pa.ctr!=null?deltaPill(a.ctr,pa.ctr):'', ''):'')
    + (a.sessKnown?kpiCard('Conv. rate', pct(a.cvr), pa&&pa.cvr!=null?deltaPill(a.cvr,pa.cvr):'', ''):'')
    + (a.sessKnown?kpiCard('Sessions', num(a.sessions), pa&&pa.sessKnown?deltaPill(a.sessions,pa.sessions):'', ''):'')
    + kpiCard('Revenue', money(a.revenue), pa?deltaPill(a.revenue,pa.revenue):'', sparkline(revSeries))
    + '</div>';

  if(state.prev){
    const floor=3000;
    const moved = brands.map(b=>{ const p=prevBrand(b.key); return {b,d:p?deltaPct(b.revenue,p.revenue):null}; }).filter(x=>x.d!=null && x.b.revenue>=floor);
    const gain = moved.filter(x=>x.d>0).sort((x,y)=>y.d-x.d).slice(0,4);
    const drop = moved.filter(x=>x.d<0).sort((x,y)=>x.d-y.d).slice(0,4);
    if(gain.length||drop.length) html += `<div class="sect">Movers</div><div class="movers fadein">`+moverCard('▲ Climbing',gain,'up')+moverCard('▼ Falling',drop,'down')+`</div>`;
  }

  html += `<div class="sect">Trends</div>`;
  html += '<div class="grid2">'
    + '<div class="card"><h3>Revenue by brand</h3><div class="chartbox"><canvas id="cRevBrand"></canvas></div></div>'
    + '<div class="card"><h3>Revenue trend</h3><div class="chartbox"><canvas id="cTrend"></canvas></div></div>'
    + '</div>';
  if(hasAds){
    html += '<div class="grid2">'
      + '<div class="card"><h3>Daily ROAS · top spenders</h3><div class="chartbox"><canvas id="cRoasDaily"></canvas></div></div>'
      + '<div class="card"><h3>ROAS by brand</h3><div class="chartbox"><canvas id="cRoas"></canvas></div></div>'
      + '</div>';
  }

  html += `<div class="sect">Per-brand breakdown</div>`;
  let rows = brands.map(b=>{ const p=prevBrand(b.key);
    return `<tr data-brand="${b.key}">
      <td class="bname">${esc(b.brand)}</td>
      <td class="num">${money(b.revenue)}</td>
      <td>${p?deltaPill(b.revenue,p.revenue):'<span class="delta flat">·</span>'}</td>
      <td class="num">${num(b.orders)}</td>
      <td class="num">${money(b.aov)}</td>
      ${hasAds?`<td class="num">${money(b.adSpend)}</td><td class="num ${b.roas!=null?(b.roas>=1?'pos':'neg'):''}">${roasFmt(b.roas)}</td><td class="num">${pct(b.ctr)}</td>`:''}
      <td class="num">${b.sessions!=null?pct(b.sessions?b.orders/b.sessions*100:null):'—'}</td>
      <td class="muted">${b.bestSeller?esc(b.bestSeller.title).slice(0,24):'—'}</td>
    </tr>`;
  }).join('');
  html += `<div class="card"><div class="tablewrap"><table>
     <thead><tr><th>Brand</th><th>Revenue</th><th>Δ</th><th>Orders</th><th>AOV</th>${hasAds?'<th>Ad spend</th><th>ROAS</th><th>CTR</th>':''}<th>CVR</th><th>Best seller</th></tr></thead>
     <tbody>${rows||'<tr><td colspan=10 class=muted>No brands</td></tr>'}</tbody></table></div></div>`;

  el('view').innerHTML = html;
  el('view').querySelectorAll('tbody tr[data-brand]').forEach(tr=>tr.onclick=()=>{state.tab=tr.dataset.brand;buildNav();render();});
  destroyCharts();

  const names = brands.map(b=>b.brand);
  charts.revBrand = new Chart(el('cRevBrand'), { type:'bar', data:{ labels:names, datasets:[{ data:brands.map(b=>Math.round(b.revenue)), backgroundColor:'#22e0ff', borderRadius:5 }] }, options:barOpts('y') });
  charts.trend = new Chart(el('cTrend'), { type:'line', data:{ labels:days, datasets:[
      { label:'Revenue', data:revSeries.map(Math.round), borderColor:'#22e0ff', backgroundColor:'rgba(34,224,255,.14)', fill:true, tension:.35, pointRadius:0, yAxisID:'y' },
      { label:'Orders', data:ordSeries, borderColor:'#8b7bff', borderWidth:2, tension:.35, pointRadius:0, yAxisID:'y1' } ] }, options:lineOpts(true) });
  if(hasAds){
    const spenders = brands.filter(b=>(b.adSpend||0)>0).sort((x,y)=>y.adSpend-x.adSpend).slice(0,4);
    const allDays = [...new Set(spenders.flatMap(b=>[...Object.keys(b.daily||{}),...Object.keys(b.dailySpend||{})]))].sort();
    charts.roasDaily = new Chart(el('cRoasDaily'), { type:'line', data:{ labels:allDays, datasets: spenders.map((b,i)=>({
        label:b.brand, data:allDays.map(d=>{ const sp=(b.dailySpend||{})[d]||0; const rv=((b.daily||{})[d]||{}).revenue||0; return sp>0?+(rv/sp).toFixed(2):null; }),
        borderColor:COLORS[i%COLORS.length], borderWidth:2, tension:.35, pointRadius:0, spanGaps:true })) }, options:pctLineOpts('ROAS','x') });
    charts.roas = new Chart(el('cRoas'), { type:'bar', data:{ labels:names, datasets:[{ data:brands.map(b=>b.roas!=null?+b.roas.toFixed(2):0), backgroundColor:brands.map(b=>b.roas!=null&&b.roas>=1?'#3ff0b0':'#ff5c8a'), borderRadius:5 }] }, options:barOpts('y') });
  }
}

function kpiCard(label, value, delta, spark, cls){
  return `<div class="kpi"><div class="kpi__top"><div class="kpi__l">${label}</div>${delta||''}</div>
    <div class="kpi__v ${cls||''} num">${value}</div>${spark?`<div class="kpi__spark">${spark}</div>`:''}</div>`;
}
function moverCard(title, rows, dir){
  const inner = rows.length ? rows.map(x=>`<div class="mrow" data-brand="${x.b.key}"><span class="mname">${esc(x.b.brand)}</span><span class="mval num">${moneyShort(x.b.revenue)} <span class="delta ${dir}">${dir==='up'?'▲':'▼'} ${Math.abs(x.d).toFixed(0)}%</span></span></div>`).join('') : '<div class="muted small" style="padding:6px 0">Nothing notable.</div>';
  const card = `<div class="mcard"><h4>${title}</h4>${inner}</div>`;
  return card;
}

function renderExport(){
  const all = state.report.brands, brands = selectedBrands();
  const allSel = state.selected.size === all.length;
  const estOrders = brands.reduce((s,b)=>s+(b.orders||0),0);
  el('view').innerHTML = `<div class="sect">Export</div><div class="card fadein">
    <h3>Orders → CSV</h3>
    <p class="muted small" style="margin:0 0 16px;line-height:1.5">One row per order — customer, items, totals, payment &amp; fulfillment status — pulled live from Shopify for the selected range and brands.</p>
    <div class="kpis" style="margin-bottom:14px">
      ${kpiCard('Date range', esc(state.report.range.label),'','')}
      ${kpiCard('Brands', allSel?('All · '+all.length):(brands.length+' selected'),'','')}
      ${kpiCard('Orders (approx.)', num(estOrders),'','')}
    </div>
    <div class="muted small" style="margin-bottom:18px">Including: ${allSel?'all brands':brands.map(b=>esc(b.brand)).join(', ')}</div>
    <button class="btn" id="dlcsv" style="display:inline-flex;align-items:center;gap:7px${state.platform!=='shopify'?';opacity:.5':''}" ${state.platform!=='shopify'?'disabled':''}><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 21h16"/></svg>Download CSV</button>
    <span class="muted small" id="dlnote" style="margin-left:12px"></span>
    ${state.platform!=='shopify'?'<div class="muted small" style="margin-top:12px">Culture Circle export turns on once its data source is connected.</div>':''}
  </div>`;
  const btn = el('dlcsv');
  if(btn && state.platform==='shopify') btn.onclick = ()=>{
    const url = `/api/export.csv?platform=${state.platform}&range=${encodeURIComponent(state.rangeText)}&brands=${encodeURIComponent([...state.selected].join(','))}`;
    el('dlnote').textContent = 'Preparing…';
    const link = document.createElement('a'); link.href = url; link.download = ''; document.body.appendChild(link); link.click(); link.remove();
    setTimeout(()=>{ el('dlnote').textContent = 'Download started ✓'; }, 2000);
  };
}

function renderBrand(key){
  const b = state.report.brands.find(x=>x.key===key);
  if(!b){ state.tab='overview'; return renderOverview(); }
  const p = prevBrand(key);
  const hasAds = (b.adSpend||0)>0;
  const days = Object.keys(b.daily||{}).sort();

  let html = `<button class="backbtn" id="backBtn">‹ All brands</button><div class="summary fadein">
    <div class="summary__eyebrow">${esc(b.brand)} · ${esc(state.report.range.label)} · revenue</div>
    <div class="summary__row"><div class="summary__big num">${money(b.revenue)}</div>${p?deltaPill(b.revenue,p.revenue,{big:true}):''}</div>
    <div class="brief"><b>${num(b.orders)}</b> orders · <b>${money(b.aov)}</b> AOV · top order <b>${money(b.maxOrder)}</b>${hasAds&&b.roas!=null?` · <b>${roasFmt(b.roas)}</b> ROAS`:''}${b.sessions!=null?` · <b>${pct(b.sessions?b.orders/b.sessions*100:null)}</b> conv.`:''}</div>
  </div>`;

  html += `<div class="sect">Key metrics</div><div class="kpis">`
    + kpiCard('Orders', num(b.orders), p?deltaPill(b.orders,p.orders):'', sparkline(days.map(d=>b.daily[d].orders),'var(--accent)'))
    + kpiCard('AOV', money(b.aov), p?deltaPill(b.aov,p.aov):'', '')
    + (hasAds?kpiCard('Ad spend', moneyShort(b.adSpend), p?deltaPill(b.adSpend,p.adSpend):'', ''):'')
    + (hasAds?kpiCard('ROAS', roasFmt(b.roas), p&&p.roas!=null?deltaPill(b.roas,p.roas):'', '', b.roas!=null?(b.roas>=1?'pos':'neg'):''):'')
    + (hasAds?kpiCard('CTR', pct(b.ctr), p&&p.ctr!=null?deltaPill(b.ctr,p.ctr):'', ''):'')
    + (b.sessions!=null?kpiCard('Conv. rate', pct(b.sessions?b.orders/b.sessions*100:null), (p&&p.sessions)?deltaPill(b.orders/b.sessions*100,p.orders/p.sessions*100):'', ''):'')
    + (b.sessions!=null?kpiCard('Sessions', num(b.sessions), p&&p.sessions!=null?deltaPill(b.sessions,p.sessions):'', ''):'')
    + `</div>`;

  html += `<div class="sect">Trends</div>`;
  html += '<div class="card"><h3>Daily revenue & orders</h3><div class="chartbox tall"><canvas id="cBd"></canvas></div></div>';
  const showCvr = b.dailySessions && Object.keys(b.dailySessions).length;
  if(hasAds && b.dailySpend && Object.keys(b.dailySpend).length){
    html += '<div class="grid2">'
      + '<div class="card"><h3>Daily ROAS</h3><div class="chartbox"><canvas id="cRoasB"></canvas></div></div>'
      + '<div class="card"><h3>Daily CTR</h3><div class="chartbox"><canvas id="cCtrB"></canvas></div></div>'
      + '</div>';
  }
  if(showCvr) html += '<div class="card"><h3>Daily conversion rate</h3><div class="chartbox"><canvas id="cCvrB"></canvas></div></div>';
  if(hasAds && b.dailySpend && Object.keys(b.dailySpend).length)
    html += '<div class="card"><h3>Ad spend vs revenue over time</h3><div class="chartbox"><canvas id="cBsr"></canvas></div></div>';

  if(b.bestSeller || (b.topProducts&&b.topProducts.length)){
    html += `<div class="sect">Products</div>`;
    const tp = (b.topProducts||[]).slice(0,5).map(pr=>`<tr><td class="bname">${esc(pr.title)}</td><td class="num">${num(pr.qty)}</td><td class="num">${money(pr.revenue)}</td></tr>`).join('');
    html += `<div class="card"><div class="tablewrap"><table style="min-width:auto"><thead><tr><th>Product</th><th>Qty</th><th>Revenue</th></tr></thead><tbody>${tp||'<tr><td class=muted colspan=3>—</td></tr>'}</tbody></table></div></div>`;
  }
  if(hasAds && b.campaigns && b.campaigns.length){
    html += `<div class="sect">Campaigns</div>`;
    const cs = b.campaigns.filter(c=>c.spend>0).sort((x,c)=>c.spend-x.spend).slice(0,12).map(c=>`<tr><td class="bname"><a href="${c.link}" target="_blank" rel="noopener">${esc(c.name)}</a></td><td class="num">${money(c.spend)}</td><td class="num">${pct(c.ctr)}</td></tr>`).join('');
    html += `<div class="card"><div class="tablewrap"><table style="min-width:auto"><thead><tr><th>Campaign</th><th>Spend</th><th>CTR</th></tr></thead><tbody>${cs}</tbody></table></div></div>`;
  }

  el('view').innerHTML = html;
  const bb = el('backBtn'); if(bb) bb.onclick=()=>{ state.tab='brands'; buildNav(); render(); window.scrollTo({top:0}); };
  destroyCharts();
  charts.bd = new Chart(el('cBd'), { type:'bar', data:{ labels:days, datasets:[
      { type:'line', label:'Revenue', data:days.map(d=>Math.round(b.daily[d].revenue)), borderColor:'#22e0ff', backgroundColor:'rgba(34,224,255,.14)', fill:true, tension:.35, pointRadius:0, yAxisID:'y', order:0 },
      { type:'bar', label:'Orders', data:days.map(d=>b.daily[d].orders), backgroundColor:'rgba(139,123,255,.65)', borderRadius:4, yAxisID:'y1', order:1 } ] }, options:lineOpts(true) });
  if(showCvr){
    const cvrDays=[...new Set(Object.keys(b.dailySessions))].sort();
    charts.cvrB = new Chart(el('cCvrB'), { type:'line', data:{ labels:cvrDays, datasets:[{ label:'Conv. rate', data:cvrDays.map(d=>{ const s=b.dailySessions[d]||0; const o=(b.daily[d]||{}).orders||0; return s>0?+((o/s)*100).toFixed(2):null; }), borderColor:'#3ff0b0', borderWidth:2, tension:.35, pointRadius:0, spanGaps:true }] }, options:pctLineOpts('Conv. rate') });
  }
  if(hasAds && b.dailySpend && Object.keys(b.dailySpend).length){
    const dd=[...new Set([...days, ...Object.keys(b.dailySpend)])].sort();
    charts.roasB = new Chart(el('cRoasB'), { type:'line', data:{ labels:dd, datasets:[{ label:'ROAS', data:dd.map(d=>{ const sp=b.dailySpend[d]||0; const rv=(b.daily[d]||{}).revenue||0; return sp>0?+(rv/sp).toFixed(2):null; }), borderColor:'#22e0ff', borderWidth:2, tension:.35, pointRadius:0, spanGaps:true }] }, options:pctLineOpts('ROAS','x') });
    const ctrDays=[...new Set(Object.keys(b.dailyImpr||{}))].sort();
    charts.ctrB = new Chart(el('cCtrB'), { type:'line', data:{ labels:ctrDays, datasets:[{ label:'CTR', data:ctrDays.map(d=>{ const im=(b.dailyImpr||{})[d]||0; const cl=(b.dailyClicks||{})[d]||0; return im>0?+((cl/im)*100).toFixed(2):null; }), borderColor:'#8b7bff', borderWidth:2, tension:.35, pointRadius:0, spanGaps:true }] }, options:pctLineOpts('CTR') });
    charts.bsr = new Chart(el('cBsr'), { type:'line', data:{ labels:dd, datasets:[
        { label:'Revenue', data:dd.map(d=>Math.round((b.daily[d]||{}).revenue||0)), borderColor:'#22e0ff', backgroundColor:'rgba(34,224,255,.14)', fill:true, tension:.35, pointRadius:0 },
        { label:'Ad spend', data:dd.map(d=>Math.round(b.dailySpend[d]||0)), borderColor:'#ff5c8a', borderWidth:2, tension:.35, pointRadius:0 } ] }, options:lineOpts(false) });
  }
}

/* ---------- chart options ---------- */
const gridc = 'rgba(120,180,255,.08)', tickc = '#8a92b2';
function barOpts(indexAxis, twoSeries){
  return { indexAxis: indexAxis==='y'?'y':'x', responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ display:!!twoSeries, labels:{color:tickc,boxWidth:12,font:{size:11}} },
      tooltip:{ callbacks:{ label:c=> `${c.dataset.label?c.dataset.label+': ':''}${c.parsed[indexAxis==='y'?'x':'y']>=1000?'₹'+RUPEE.format(c.parsed[indexAxis==='y'?'x':'y']):c.parsed[indexAxis==='y'?'x':'y']}` } } },
    scales:{ x:{ grid:{color:gridc}, ticks:{color:tickc,font:{size:10},autoSkip:true,maxRotation:0} }, y:{ grid:{color:gridc}, ticks:{color:tickc,font:{size:10}} } } };
}
function lineOpts(dual){
  const s = { x:{ grid:{color:gridc}, ticks:{color:tickc,font:{size:10},maxRotation:0,autoSkip:true} }, y:{ position:'left', grid:{color:gridc}, ticks:{color:tickc,font:{size:10}} } };
  if(dual) s.y1 = { position:'right', grid:{drawOnChartArea:false}, ticks:{color:tickc,font:{size:10}} };
  return { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{color:tickc,boxWidth:12,font:{size:11}} } }, scales:s };
}
// percentage/multiple line charts. suffix '%' by default, 'x' for ROAS via unit arg.
function pctLineOpts(label, unitKind){
  const unit = unitKind==='x' ? 'x' : '%';
  const multi = label==='ROAS';
  return { responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ display:multi, labels:{color:tickc,boxWidth:12,font:{size:11}} },
      tooltip:{ callbacks:{ label:c=>`${c.dataset.label||label}: ${c.parsed.y}${unit}` } } },
    scales:{ x:{ grid:{color:gridc}, ticks:{color:tickc,font:{size:10},maxRotation:0,autoSkip:true} },
      y:{ grid:{color:gridc}, ticks:{color:tickc,font:{size:10},callback:v=>v+unit}, suggestedMin:0 } } };
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

/* ---------- controls wiring ---------- */
el('rangeChips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
  el('rangeChips').querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');
  if(c.dataset.range==='__custom'){ el('customBox').classList.add('show'); return; }
  el('customBox').classList.remove('show');
  state.rangeText = c.dataset.range; load();
});
el('applyCustom').onclick=()=>{
  const f=el('fromDate').value, t=el('toDate').value;
  if(!f||!t){ alert('Pick both dates'); return; }
  state.rangeText = `${ddmmyy(f)}-${ddmmyy(t)}`; load();
};
el('modeSeg').querySelectorAll('.seg').forEach(s=>s.onclick=()=>{
  if(s.classList.contains('on')) return;
  el('modeSeg').querySelectorAll('.seg').forEach(x=>x.classList.remove('on'));
  s.classList.add('on');
  state.platform = s.dataset.platform; state.selected = null; state.tab = 'overview'; load();
});
el('bpickBtn').onclick=(e)=>{ e.stopPropagation(); el('bpickPanel').classList.toggle('show'); };
document.addEventListener('click',e=>{ if(!e.target.closest('.bpick')) el('bpickPanel').classList.remove('show'); });
el('tabbar').querySelectorAll('.tabbtn').forEach(t=>t.onclick=()=>{ state.tab=t.dataset.nav; buildNav(); render(); window.scrollTo({top:0}); });

load();
</script>
</body>
</html>
